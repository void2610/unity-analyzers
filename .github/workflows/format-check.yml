name: Shared Format

on:
  workflow_call:

jobs:
  format-check:
    name: Run
    runs-on: ubuntu-latest
    env:
      FORMAT_SDK_VERSION: 8.0.123
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.FORMAT_SDK_VERSION }}
            7.0.x

      - name: Pin SDK for repo root
        run: |
          cat > global.json <<EOF
          {
            "sdk": {
              "version": "${FORMAT_SDK_VERSION}",
              "rollForward": "disable"
            }
          }
          EOF

      - name: Build analyzer
        run: dotnet build unity-coding-standards/src/Void2610.Unity.Analyzers/Void2610.Unity.Analyzers.csproj -c Release

      - name: Run analyzer tests
        run: dotnet test unity-coding-standards/tests/Void2610.Unity.Analyzers.Tests/Void2610.Unity.Analyzers.Tests.csproj -c Release --verbosity normal

      - name: Print format diagnostics
        run: |
          echo "pwd: $(pwd)"
          uname -a
          dotnet --version
          dotnet --info
          dotnet format --version
          dotnet msbuild FormatCheck.csproj -nologo -getProperty:NETCoreSdkVersion
          grep -n "dotnet_style_require_accessibility_modifiers" .editorconfig unity-coding-standards/config/.editorconfig

      - name: Check formatting
        run: ./unity-coding-standards/scripts/run-format.sh --verify-no-changes
